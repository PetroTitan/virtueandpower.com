name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a newer push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · validate · build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      # The validator runs before the build via the prebuild npm hook, but
      # we run it as its own step too so failures appear with the right
      # heading in the GitHub Actions UI and so the markdown report can be
      # captured as a build artefact.
      - name: Content health
        run: npm run validate:content:report

      - name: Upload content-health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-health-report
          path: reports/content-health.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Next.js build
        run: npm run build
